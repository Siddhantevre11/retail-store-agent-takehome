<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Retail agent: system architecture (block diagram)</title>
  <desc>A user talks to a command-line interface. The interface passes the request to an AI agent, which proposes actions but does not execute them. Proposed actions cross a mutation boundary into the tool layer, which validates every request. The tool layer uses a pure calculation core for all money and inventory math, and reads from and writes to a database. The database is loaded once from CSV files at startup.</desc>

  <style>
    .t   { font-size: 15px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; }
    .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
    .arrlbl { fill: #5F5E5A; font-size: 12px; font-weight: 400; }
    .bnd { fill: #A32D2D; font-size: 12px; font-weight: 500; }
    .bndline { stroke: #A32D2D; stroke-width: 1; stroke-dasharray: 5 4; }

    .gray-fill   { fill: #F1EFE8; stroke: #5F5E5A; } .gray-t { fill: #2C2C2A; } .gray-s { fill: #5F5E5A; }
    .purple-fill { fill: #EEEDFE; stroke: #534AB7; } .purple-t { fill: #26215C; } .purple-s { fill: #534AB7; }
    .blue-fill   { fill: #E6F1FB; stroke: #185FA5; } .blue-t { fill: #042C53; } .blue-s { fill: #185FA5; }
    .teal-fill   { fill: #E1F5EE; stroke: #0F6E56; } .teal-t { fill: #04342C; } .teal-s { fill: #0F6E56; }

    @media (prefers-color-scheme: dark) {
      .arr { stroke: #9c9a92; } .arrlbl { fill: #B4B2A9; }
      .bnd { fill: #F09595; } .bndline { stroke: #F09595; }
      .gray-fill   { fill: #2C2C2A; stroke: #B4B2A9; } .gray-t { fill: #F1EFE8; } .gray-s { fill: #D3D1C7; }
      .purple-fill { fill: #3C3489; stroke: #AFA9EC; } .purple-t { fill: #EEEDFE; } .purple-s { fill: #CECBF6; }
      .blue-fill   { fill: #0C447C; stroke: #85B7EB; } .blue-t { fill: #E6F1FB; } .blue-s { fill: #B5D4F4; }
      .teal-fill   { fill: #085041; stroke: #5DCAA5; } .teal-t { fill: #E1F5EE; } .teal-s { fill: #9FE1CB; }
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User -->
  <g>
    <rect class="gray-fill" x="270" y="30" width="140" height="56" rx="10" stroke-width="0.5"/>
    <text class="gray-t t" x="340" y="52" text-anchor="middle" dominant-baseline="central">User</text>
    <text class="gray-s ts" x="340" y="72" text-anchor="middle" dominant-baseline="central">plain-English CLI</text>
  </g>

  <line x1="340" y1="86" x2="340" y2="116" class="arr" marker-end="url(#arrow)"/>

  <!-- Agent -->
  <g>
    <rect class="purple-fill" x="230" y="116" width="220" height="56" rx="10" stroke-width="0.5"/>
    <text class="purple-t t" x="340" y="138" text-anchor="middle" dominant-baseline="central">AI agent</text>
    <text class="purple-s ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">proposes actions, never executes</text>
  </g>

  <line x1="340" y1="172" x2="340" y2="216" class="arr" marker-end="url(#arrow)"/>
  <text class="arrlbl" x="356" y="187" text-anchor="start">proposed action</text>

  <!-- Mutation boundary -->
  <line x1="60" y1="196" x2="620" y2="196" class="bndline"/>
  <text class="bnd" x="60" y="188" text-anchor="start">mutation boundary</text>

  <!-- Tool layer -->
  <g>
    <rect class="blue-fill" x="210" y="216" width="260" height="56" rx="10" stroke-width="0.5"/>
    <text class="blue-t t" x="340" y="238" text-anchor="middle" dominant-baseline="central">Tool layer</text>
    <text class="blue-s ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">validates every request, then acts</text>
  </g>

  <!-- to core -->
  <line x1="270" y1="272" x2="200" y2="336" class="arr" marker-end="url(#arrow)"/>
  <text class="arrlbl" x="205" y="300" text-anchor="end">calculate</text>

  <!-- to db -->
  <line x1="410" y1="272" x2="480" y2="336" class="arr" marker-end="url(#arrow)"/>
  <text class="arrlbl" x="478" y="300" text-anchor="start">read / write</text>

  <!-- Core -->
  <g>
    <rect class="teal-fill" x="70" y="336" width="220" height="62" rx="10" stroke-width="0.5"/>
    <text class="teal-t t" x="180" y="358" text-anchor="middle" dominant-baseline="central">Calculation core</text>
    <text class="teal-s ts" x="180" y="378" text-anchor="middle" dominant-baseline="central">all money + inventory math</text>
  </g>

  <!-- Database -->
  <g>
    <rect class="gray-fill" x="390" y="336" width="220" height="62" rx="10" stroke-width="0.5"/>
    <text class="gray-t t" x="500" y="358" text-anchor="middle" dominant-baseline="central">Database</text>
    <text class="gray-s ts" x="500" y="378" text-anchor="middle" dominant-baseline="central">products, orders, stock, returns</text>
  </g>

  <!-- CSV startup -->
  <g>
    <rect class="gray-fill" x="390" y="420" width="220" height="34" rx="8" stroke-width="0.5"/>
    <text class="gray-s ts" x="500" y="437" text-anchor="middle" dominant-baseline="central">loaded from CSV at startup</text>
  </g>
  <line x1="500" y1="420" x2="500" y2="400" class="arr" marker-end="url(#arrow)"/>
</svg>
